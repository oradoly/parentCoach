<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Parent Coach Cal.com-inspired mobile screen samples</title>
  <desc id="desc">Four monochrome mobile screen samples for Parent Coach: home capture, recognition review, first coaching question, and final solution with similar problem folded.</desc>
  <defs>
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#0A0A0A" flood-opacity="0.13"/>
    </filter>
    <filter id="ringShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#131316" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#222A35" flood-opacity="0.06"/>
    </filter>
    <style>
      .bg { fill: #f4f4f4; }
      .surface { fill: #ffffff; }
      .soft { fill: #fafafa; }
      .muted { fill: #f4f4f4; }
      .ink { fill: #0a0a0a; }
      .secondary { fill: #666666; }
      .tertiary { fill: #898989; }
      .border { stroke: #d8d8d8; }
      .strong-border { stroke: #0a0a0a; }
      .label { font: 700 12px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .small-bold { font: 700 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .body { font: 400 16px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .body-bold { font: 750 16px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .title { font: 750 24px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .display { font: 750 46px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .script { font: 750 20px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .answer { font: 800 30px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text class="label tertiary" x="64" y="70">CAL.COM-LIKE QUIET COACHING UTILITY</text>
  <text class="display ink" x="64" y="126">부모가 답을 말하기 전에,</text>
  <text class="display ink" x="64" y="178">한 번 숨 고르고 질문을 고르는 화면</text>
  <text class="small secondary" x="1130" y="92">중립적인 흑백 UI, shadow-ring 카드,</text>
  <text class="small secondary" x="1130" y="116">명확한 액션 위계를 참고한 샘플입니다.</text>

  <!-- Screen 01 -->
  <g transform="translate(64 240)">
    <text class="label secondary" x="0" y="-22">01 홈 · 촬영 중심</text>
    <rect class="surface" x="0" y="0" width="340" height="670" rx="28" filter="url(#phoneShadow)"/>
    <rect class="surface" x="12" y="12" width="316" height="646" rx="20" stroke="#e6e6e6"/>
    <text class="label ink" x="30" y="48">9:41</text>
    <circle class="ink" cx="286" cy="42" r="3"/><circle class="ink" cx="296" cy="42" r="3"/><circle class="ink" cx="306" cy="42" r="3"/>
    <rect class="soft" x="30" y="76" width="112" height="28" rx="14" stroke="#e6e6e6"/>
    <text class="label secondary" x="42" y="95">초등 5-6 수학</text>
    <text class="title ink" x="30" y="142">아이에게 어떻게</text>
    <text class="title ink" x="30" y="174">물어볼지 먼저 준비해요</text>
    <text class="small secondary" x="30" y="204">한 문제만 찍으면 질문과 힌트를</text>
    <text class="small secondary" x="30" y="224">정답보다 먼저 정리해 드려요.</text>
    <rect class="surface" x="30" y="268" width="280" height="250" rx="8" stroke="#d8d8d8" stroke-dasharray="8 8" filter="url(#ringShadow)"/>
    <rect class="muted" x="142" y="328" width="56" height="56" rx="16"/>
    <path d="M157 359h8l4-6h18l4 6h8a8 8 0 0 1 8 8v22a8 8 0 0 1-8 8h-42a8 8 0 0 1-8-8v-22a8 8 0 0 1 8-8z" fill="none" stroke="#0a0a0a" stroke-width="2"/>
    <circle cx="178" cy="378" r="9" fill="none" stroke="#0a0a0a" stroke-width="2"/>
    <text class="body-bold ink" text-anchor="middle" x="170" y="426">문제 하나를 화면 안에</text>
    <text class="body-bold ink" text-anchor="middle" x="170" y="450">맞춰 주세요.</text>
    <text class="small secondary" text-anchor="middle" x="170" y="480">그림이나 표도 함께 넣어 주세요.</text>
    <rect class="ink" x="30" y="550" width="280" height="48" rx="6"/>
    <text class="body-bold surface" text-anchor="middle" x="170" y="581">카메라 열기</text>
    <rect class="surface" x="30" y="610" width="280" height="48" rx="6" stroke="#d8d8d8"/>
    <text class="body-bold ink" text-anchor="middle" x="170" y="641">사진 선택</text>
  </g>

  <!-- Screen 02 -->
  <g transform="translate(442 240)">
    <text class="label secondary" x="0" y="-22">02 인식 확인 · 확정 전 게이트</text>
    <rect class="surface" x="0" y="0" width="340" height="670" rx="28" filter="url(#phoneShadow)"/>
    <rect class="surface" x="12" y="12" width="316" height="646" rx="20" stroke="#e6e6e6"/>
    <text class="label ink" x="30" y="48">9:42</text>
    <circle class="ink" cx="286" cy="42" r="3"/><circle class="ink" cx="296" cy="42" r="3"/><circle class="ink" cx="306" cy="42" r="3"/>
    <rect class="soft" x="30" y="76" width="88" height="28" rx="14" stroke="#e6e6e6"/>
    <text class="label secondary" x="42" y="95">확인 필요</text>
    <text class="title ink" x="30" y="142">제가 이렇게 읽었어요</text>
    <text class="small secondary" x="30" y="174">숫자, 단위, 물음이 맞는지</text>
    <text class="small secondary" x="30" y="194">확인해 주세요.</text>
    <rect class="surface" x="30" y="232" width="280" height="218" rx="8" filter="url(#ringShadow)"/>
    <text class="label tertiary" x="46" y="262">인식된 문제</text>
    <text class="body ink" x="46" y="298">3/4L의 주스가 있습니다.</text>
    <text class="body ink" x="46" y="324">한 컵에 1/8L씩 담으면</text>
    <text class="body ink" x="46" y="350">모두 몇 컵에 담을 수 있나요?</text>
    <rect class="muted" x="46" y="392" width="138" height="26" rx="4"/>
    <text class="label secondary" x="56" y="410">1/8L 부분 확인 권장</text>
    <rect class="surface" x="30" y="464" width="280" height="94" rx="8" filter="url(#ringShadow)"/>
    <text class="label tertiary" x="46" y="496">범위</text>
    <text class="small ink" x="122" y="496">초등 6학년 분수의 나눗셈</text>
    <line x1="46" y1="516" x2="294" y2="516" stroke="#d8d8d8"/>
    <text class="label tertiary" x="46" y="540">주의</text>
    <text class="small ink" x="122" y="540">전체 양을 먼저 확인해요.</text>
    <rect class="ink" x="30" y="582" width="280" height="48" rx="6"/>
    <text class="body-bold surface" text-anchor="middle" x="170" y="613">맞아요</text>
  </g>

  <!-- Screen 03 -->
  <g transform="translate(820 240)">
    <text class="label secondary" x="0" y="-22">03 코칭 첫 화면 · 질문 먼저</text>
    <rect class="surface" x="0" y="0" width="340" height="670" rx="28" filter="url(#phoneShadow)"/>
    <rect class="surface" x="12" y="12" width="316" height="646" rx="20" stroke="#e6e6e6"/>
    <text class="label ink" x="30" y="48">9:43</text>
    <circle class="ink" cx="286" cy="42" r="3"/><circle class="ink" cx="296" cy="42" r="3"/><circle class="ink" cx="306" cy="42" r="3"/>
    <rect class="soft" x="30" y="76" width="104" height="28" rx="14" stroke="#e6e6e6"/>
    <text class="label secondary" x="42" y="95">코칭 준비됨</text>
    <text class="title ink" x="30" y="142">먼저 아이 생각을</text>
    <text class="title ink" x="30" y="174">확인해요</text>
    <text class="small secondary" x="30" y="204">무엇을 구하는지부터 짚어 주세요.</text>
    <rect class="surface" x="30" y="236" width="280" height="188" rx="8" stroke="#0a0a0a" filter="url(#ringShadow)"/>
    <text class="label tertiary" x="46" y="266">아이에게 먼저 이렇게 물어보세요</text>
    <text class="script ink" x="46" y="306">“전체 주스 안에</text>
    <text class="script ink" x="46" y="334">한 컵의 양이 몇 번</text>
    <text class="script ink" x="46" y="362">들어가는지 묻는 문제일까?”</text>
    <text class="small secondary" x="46" y="398">의도: 나눗셈 상황을 말로 확인합니다.</text>
    <rect class="surface" x="30" y="440" width="280" height="126" rx="8" filter="url(#ringShadow)"/>
    <text class="label tertiary" x="46" y="470">힌트 1 · 방향</text>
    <text class="body-bold ink" x="46" y="500">전체 양과 한 컵의 양을</text>
    <text class="body-bold ink" x="46" y="524">나눠서 보게 해요.</text>
    <text class="small secondary" x="46" y="550">“한 컵씩 몇 번 채울 수 있을까?”</text>
    <rect class="soft" x="30" y="584" width="280" height="44" rx="6" stroke="#e6e6e6"/>
    <text class="small-bold secondary" x="46" y="612">힌트 2는 아직 접혀 있어요</text>
    <text class="small-bold secondary" x="258" y="612">보기</text>
  </g>

  <!-- Screen 04 -->
  <g transform="translate(1198 240)">
    <text class="label secondary" x="0" y="-22">04 최종 풀이 · 명시적 공개 후</text>
    <rect class="surface" x="0" y="0" width="340" height="670" rx="28" filter="url(#phoneShadow)"/>
    <rect class="surface" x="12" y="12" width="316" height="646" rx="20" stroke="#e6e6e6"/>
    <text class="label ink" x="30" y="48">9:45</text>
    <circle class="ink" cx="286" cy="42" r="3"/><circle class="ink" cx="296" cy="42" r="3"/><circle class="ink" cx="306" cy="42" r="3"/>
    <rect class="soft" x="30" y="76" width="132" height="28" rx="14" stroke="#e6e6e6"/>
    <text class="label secondary" x="42" y="95">계산으로 확인했어요</text>
    <text class="title ink" x="30" y="142">최종 풀이</text>
    <text class="small secondary" x="30" y="174">힌트 뒤에만 보여 주는 화면입니다.</text>
    <rect class="surface" x="30" y="216" width="280" height="258" rx="8" filter="url(#ringShadow)"/>
    <text class="label tertiary" x="46" y="246">답</text>
    <text class="answer ink" x="46" y="292">6</text>
    <text class="small-bold secondary" x="84" y="292">컵</text>
    <circle class="muted" cx="57" cy="330" r="11"/><text class="label secondary" text-anchor="middle" x="57" y="335">1</text>
    <text class="small ink" x="76" y="334">전체 양은 3/4L, 한 컵은 1/8L예요.</text>
    <circle class="muted" cx="57" cy="374" r="11"/><text class="label secondary" text-anchor="middle" x="57" y="379">2</text>
    <text class="small ink" x="76" y="370">몇 번 들어가는지 구하므로</text>
    <text class="small ink" x="76" y="390">3/4 ÷ 1/8로 나타내요.</text>
    <circle class="muted" cx="57" cy="432" r="11"/><text class="label secondary" text-anchor="middle" x="57" y="437">3</text>
    <text class="small ink" x="76" y="428">나누는 분수를 뒤집어</text>
    <text class="small ink" x="76" y="448">3/4 × 8/1로 계산해요.</text>
    <rect class="soft" x="30" y="492" width="280" height="104" rx="8" stroke="#e6e6e6"/>
    <text class="body-bold ink" x="46" y="526">비슷한 문제</text>
    <text class="small secondary" x="46" y="552">2/3L의 물을 한 컵에 1/6L씩</text>
    <text class="small secondary" x="46" y="572">담으면 모두 몇 컵일까요?</text>
    <text class="label secondary" x="46" y="616">풀이와 답은 접힘</text>
    <text class="label secondary" x="272" y="616">열기</text>
  </g>
</svg>
